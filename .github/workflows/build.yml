name: Build FFmpeg (multi-platform)

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Create GitHub Release?"
        required: false
        default: "true"
  schedule:
    - cron: "0 3 * * *"

# Needed for creating releases and uploading release assets
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout FFmpeg
        run: |
          git clone --depth=1 https://git.ffmpeg.org/ffmpeg.git ffmpeg

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y build-essential yasm pkg-config nasm

      - name: Install macOS deps
        if: matrix.os == 'macos-latest'
        run: |
          brew install yasm pkg-config

      - name: Install Windows deps (MSYS2)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-pkgconf

      # ---------- BUILD LINUX ----------
      - name: Build Linux FFmpeg
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd ffmpeg
          ./configure \
            --disable-shared \
            --enable-static \
            --disable-debug \
            --disable-doc \
            --enable-small
          make -j$(nproc)

      # ---------- BUILD MACOS ----------
      - name: Build macOS FFmpeg
        if: matrix.os == 'macos-latest'
        run: |
          cd ffmpeg
          ./configure \
            --disable-shared \
            --enable-static \
            --disable-debug \
            --disable-doc \
            --enable-small
          make -j$(sysctl -n hw.ncpu)

      # ---------- BUILD WINDOWS ----------
      - name: Build Windows FFmpeg
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd ffmpeg
          ./configure \
            --target-os=mingw32 \
            --arch=x86_64 \
            --disable-shared \
            --enable-static \
            --disable-debug \
            --disable-doc \
            --enable-small
          make -j$(nproc)

      # ---------- PACKAGE ARTIFACT ----------
      - name: Package build output
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          OS="${{ matrix.os }}"
          if [[ "$OS" == "windows-latest" ]]; then
            if command -v zip >/dev/null 2>&1; then
              zip -j "dist/ffmpeg-${{ matrix.os }}.zip" ffmpeg/ffmpeg.exe
            else
              7z a "dist/ffmpeg-${{ matrix.os }}.zip" ./ffmpeg/ffmpeg.exe
            fi
            echo "asset=dist/ffmpeg-${{ matrix.os }}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -C ffmpeg -czf "dist/ffmpeg-${{ matrix.os }}.tar.gz" ffmpeg
            echo "asset=dist/ffmpeg-${{ matrix.os }}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.os }}
          path: ${{ steps.pkg.outputs.asset }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release == 'true' }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create tag name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "tag=ffmpeg-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "title=FFmpeg build #${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            dist/**/ffmpeg-*.zip
            dist/**/ffmpeg-*.tar.gz
